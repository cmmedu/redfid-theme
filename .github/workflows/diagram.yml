name: Generate Diagram

on:
  workflow_call:
  push:
    branches:
      - 'vlabx-release/**'
    paths:
      - 'Dockerfile'
      - 'requirements/**.txt'
      - '.github/workflows/diagram.yml'
      - 'themes/**'
      - '.gitmodules'

jobs:
  call-another-reusable:
    uses: eol-uchile/edx-staging/.github/workflows/diagram.yml@eol-release/koa
    with:
      app_id: ${{ vars.EOLITO_BOT_APP_ID }}
    secrets:
      private_key: ${{ secrets.EOLITO_BOT_PRIVATE_KEY }}
